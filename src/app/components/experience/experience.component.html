<div class="experience-section">
  <div class="experience-container">
    <h1 class="experience-heading">
      My <strong class="purple">Experience</strong>
    </h1>
    <p style="color: white; text-align: center; margin-bottom: 3rem;">
      Here is my professional work experience
    </p>

    <div class="experience-timeline">
      <div class="experience-card" *ngFor="let exp of experienceData; let i = index">
        <div class="timeline-dot"></div>
        <mat-card class="experience-card-view">
          <mat-card-header>
            <mat-card-title>{{ exp.position }}</mat-card-title>
            <mat-card-subtitle>{{ exp.company }}</mat-card-subtitle>
          </mat-card-header>
          <mat-card-content>
            <div class="experience-meta">
              <div class="experience-info">
                <mat-icon>calendar_today</mat-icon>
                <span>{{ exp.duration }}</span>
              </div>
              <div class="experience-info" *ngIf="exp.location">
                <mat-icon>location_on</mat-icon>
                <span>{{ exp.location }}</span>
              </div>
              <div class="experience-info" *ngIf="exp.type">
                <mat-icon>work</mat-icon>
                <span>{{ exp.type }}</span>
              </div>
            </div>
            <div class="experience-responsibilities">
              <h4>Key Responsibilities:</h4>
              <ul>
                <li *ngFor="let responsibility of exp.responsibilities">
                  <mat-icon>check_circle</mat-icon>
                  <span>{{ responsibility }}</span>
                </li>
              </ul>
            </div>
          </mat-card-content>
        </mat-card>
      </div>
    </div>
  </div>
</div>
